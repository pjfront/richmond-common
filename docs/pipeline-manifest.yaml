# Pipeline Lineage Manifest — Richmond Common
#
# Machine-readable map of every data pipeline from external source to frontend field.
# Validated against actual code by `src/pipeline_map.py validate` and CI test.
#
# AI-maintained: Updated in the same commit as any pipeline change.
# Human-maintained: schedule descriptions and cross-boundary relationships.
#
# Structure:
#   sources      → External APIs/portals and their scraper modules
#   tables       → Database tables with upstream writers and downstream readers
#   enrichments  → Processing stages (extraction, scanning, generation)
#   queries      → Frontend query functions and the tables they read
#   rpcs         → Supabase RPC functions (server-side SQL)
#   api_routes   → Next.js API routes (bypass queries.ts)
#   pages        → Frontend routes, queries used, and visible fields
#   schedules    → Cloud workflows, cron triggers, and sources they run
#   field_map    → End-to-end: visible field → query/API → table.column → pipeline source

# ══════════════════════════════════════════════════════════════
# SOURCES — External data → scraper module → database tables
# ══════════════════════════════════════════════════════════════

sources:
  netfile:
    sync_key: netfile
    module: netfile_client.py
    external_api: "https://netfile.com/Connect2/api"
    description: "Local campaign finance (City Clerk e-filing, Agency 163)"
    tables_written:
      - contributions
      - donors
      - committees
    layer: 2

  calaccess:
    sync_key: calaccess
    module: calaccess_client.py
    external_api: "https://campaignfinance.cdn.sos.ca.gov/dbwebexport.zip"
    description: "State campaign finance (PACs, IEs, ballot measures)"
    tables_written:
      - contributions
      - donors
      - committees
      - independent_expenditures
    layer: 2

  escribemeetings:
    sync_key: escribemeetings
    module: escribemeetings_scraper.py
    external_api: "https://pub-richmond.escribemeetings.com/"
    description: "Full agenda packets (City Council only)"
    tables_written:
      - documents
      - meetings
      - agenda_items
    layer: [1, 2]

  nextrequest:
    sync_key: nextrequest
    module: nextrequest_scraper.py
    external_api: "https://cityofrichmondca.nextrequest.com"
    description: "Public records / CPRA requests"
    tables_written:
      - nextrequest_requests
      - nextrequest_documents
    layer: 2

  archive_center:
    sync_key: archive_center
    module: archive_center_discovery.py
    external_api: "https://www.ci.richmond.ca.us/ArchiveCenter/"
    description: "Council minutes PDFs, resolutions, ordinances (9 AMIDs)"
    tables_written:
      - documents
    layer: 1

  form700:
    sync_key: form700
    module: form700_scraper.py
    external_api: "https://public.netfile.com/pub/?AID=RICH"
    description: "Statement of Economic Interests (Form 700)"
    tables_written:
      - documents
      - form700_filings
      - economic_interests
    layer: [1, 2]

  minutes_extraction:
    sync_key: minutes_extraction
    module: batch_extract.py
    external_api: null  # Reads from documents table (Layer 1)
    description: "AI extraction of structured data from council minutes PDFs"
    reads_from:
      - documents
    tables_written:
      - extraction_runs
      - meetings
      - agenda_items
      - motions
      - votes
      - meeting_attendance
      - closed_session_items
      - public_comments
      - friendly_amendments
    layer: 2

  socrata_payroll:
    sync_key: socrata_payroll
    module: socrata_client.py
    external_api: "https://www.transparentrichmond.org"
    description: "City employee payroll data"
    tables_written:
      - city_employees
      - city_employee_pay
    layer: 2

  socrata_expenditures:
    sync_key: socrata_expenditures
    module: socrata_client.py
    external_api: "https://www.transparentrichmond.org"
    description: "City expenditure records (vendor payments)"
    tables_written:
      - city_expenditures
    layer: 2

  socrata_permits:
    sync_key: socrata_permits
    module: socrata_client.py
    external_api: "https://www.transparentrichmond.org"
    description: "Building permits"
    tables_written:
      - city_permits
    layer: 2

  socrata_licenses:
    sync_key: socrata_licenses
    module: socrata_client.py
    external_api: "https://www.transparentrichmond.org"
    description: "Business licenses"
    tables_written:
      - city_licenses
    layer: 2

  socrata_code_cases:
    sync_key: socrata_code_cases
    module: socrata_client.py
    external_api: "https://www.transparentrichmond.org"
    description: "Code enforcement cases"
    tables_written:
      - city_code_cases
    layer: 2

  socrata_service_requests:
    sync_key: socrata_service_requests
    module: socrata_client.py
    external_api: "https://www.transparentrichmond.org"
    description: "311 service requests"
    tables_written:
      - city_service_requests
    layer: 2

  socrata_projects:
    sync_key: socrata_projects
    module: socrata_client.py
    external_api: "https://www.transparentrichmond.org"
    description: "Capital projects"
    tables_written:
      - city_projects
    layer: 2

  courts:
    sync_key: courts
    module: courts_scraper.py
    external_api: "https://odyportal.cc-courts.org"
    description: "Contra Costa court records (civil cases)"
    tables_written:
      - documents
      - court_records
    layer: [1, 2]

  propublica:
    sync_key: propublica
    module: propublica_client.py
    external_api: "https://projects.propublica.org/nonprofits/api/v2"
    description: "Nonprofit organization data (990 filings)"
    tables_written:
      - organizations
      - entity_links
    layer: 2

  form803_behested:
    sync_key: form803_behested
    module: fppc_form803_client.py
    external_api: "https://fppc.ca.gov/api/behested-payments/search"
    description: "FPPC Form 803 behested payment disclosures"
    tables_written:
      - behested_payments
    layer: 2

  lobbyist_registrations:
    sync_key: lobbyist_registrations
    module: lobbyist_client.py
    external_api: "https://www.ci.richmond.ca.us/DocumentCenter/View/{doc_id}"
    description: "City Clerk lobbyist registration PDFs (Municipal Code 2.54) — downloaded by Document ID, extracted via Claude Vision API"
    tables_written:
      - lobbyist_registrations
    layer: 2

  opencorporates:
    sync_key: opencorporates
    module: opencorporates_client.py
    external_api: "https://api.opencorporates.com/v0.4/"
    description: "Business entity resolution (CA SOS data via OpenCorporates aggregator). Company search, officer lookup, entity name matching. Rate limited: 50/day, 200/month."
    tables_written:
      - business_entities
      - business_entity_officers
      - entity_name_matches
      - opencorporates_api_usage
    layer: 2


# ══════════════════════════════════════════════════════════════
# TABLES — Database tables with upstream/downstream references
# ══════════════════════════════════════════════════════════════

tables:
  # ── Layer 1: Document Lake ──────────────────────────────────

  documents:
    layer: 1
    description: "Raw documents with JSONB metadata (source of truth, immutable)"
    written_by:
      sources: [archive_center, escribemeetings, form700, courts]
      enrichments: []
    read_by:
      enrichments: [minutes_extraction, form700_extraction]
      queries: []

  extraction_runs:
    layer: 1
    description: "AI extraction results linked to source documents"
    written_by:
      sources: [minutes_extraction]
      enrichments: []
    read_by:
      enrichments: []
      queries: []

  # ── Layer 2: Structured Core — Meetings ─────────────────────

  meetings:
    layer: 2
    description: "Normalized meeting records"
    written_by:
      sources: [escribemeetings, minutes_extraction]
      enrichments: []
    read_by:
      enrichments: [conflict_scanning]
      queries: [getMeetings, getMeetingsWithCounts, getMeeting, getMeetingStats,
                getMeetingsWithFlags, getMeetingForReport, getCoalitionData,
                getCrossMeetingPatterns, getCommissionMeetings]

  agenda_items:
    layer: 2
    description: "Individual items on meeting agendas"
    written_by:
      sources: [escribemeetings, minutes_extraction]
      enrichments: [summary_generation]
    read_by:
      enrichments: [conflict_scanning, summary_generation]
      queries: [getMeeting, getMeetingStats, getMeetingForReport,
                getCategoryStats, getControversialItems]

  motions:
    layer: 2
    description: "Motions made on agenda items with vote tallies"
    written_by:
      sources: [minutes_extraction]
      enrichments: [vote_explainer_generation]
    read_by:
      enrichments: [vote_explainer_generation]
      queries: [getMeeting, getFinancialConnectionsForOfficial,
                getAllFinancialConnectionSummaries, getCrossMeetingPatterns]

  votes:
    layer: 2
    description: "Individual roll-call votes on motions"
    written_by:
      sources: [minutes_extraction]
      enrichments: []
    read_by:
      enrichments: []
      queries: [getMeeting, getOfficialVotingRecord, getMeetingStats,
                getOfficialWithStats, getOfficialCategoryBreakdown,
                getCoalitionData, getCrossMeetingPatterns]

  meeting_attendance:
    layer: 2
    description: "Per-meeting attendance records for officials"
    written_by:
      sources: [minutes_extraction]
      enrichments: []
    read_by:
      enrichments: []
      queries: [getMeeting, getAttendance, getOfficialWithStats]

  closed_session_items:
    layer: 2
    description: "Closed/executive session agenda items"
    written_by:
      sources: [minutes_extraction]
      enrichments: []
    read_by:
      enrichments: []
      queries: [getMeeting]

  public_comments:
    layer: 2
    description: "Public comment records from meetings"
    written_by:
      sources: [minutes_extraction]
      enrichments: [comment_generation]
    read_by:
      enrichments: []
      queries: []

  friendly_amendments:
    layer: 2
    description: "Amendments proposed to motions"
    written_by:
      sources: [minutes_extraction]
      enrichments: []
    read_by:
      enrichments: []
      queries: []

  # ── Layer 2: Structured Core — Officials ────────────────────

  officials:
    layer: 2
    description: "Elected officials and appointed members"
    written_by:
      sources: []
      enrichments: [bio_generation, commission_seeding]
    read_by:
      enrichments: [conflict_scanning, bio_generation]
      queries: [getOfficials, getOfficialBySlug, getOfficialWithStats,
                getCoalitionData, getCrossMeetingPatterns,
                getAllFinancialConnectionSummaries]

  # ── Layer 2: Structured Core — Finance ──────────────────────

  contributions:
    layer: 2
    description: "Campaign contributions (NetFile local + CAL-ACCESS state). contributor_type classification (corporate/union/individual/pac_ie/other) via contributor_classifier.py"
    written_by:
      sources: [netfile, calaccess]
      enrichments: [contributor_classification]
    read_by:
      enrichments: [conflict_scanning]
      queries: [getTopDonors, getMeetingStats, getFinancialConnectionsForOfficial,
                getAllFinancialConnectionSummaries, getCrossMeetingPatterns]

  donors:
    layer: 2
    description: "Normalized donor records with aggregated stats"
    written_by:
      sources: [netfile, calaccess]
      enrichments: []
    read_by:
      enrichments: [conflict_scanning]
      queries: [getTopDonors]

  committees:
    layer: 2
    description: "Political committees linked to candidates"
    written_by:
      sources: [netfile, calaccess]
      enrichments: []
    read_by:
      enrichments: []
      queries: [getTopDonors, getCrossMeetingPatterns]

  independent_expenditures:
    layer: 2
    description: "Independent expenditure records (CAL-ACCESS)"
    written_by:
      sources: [calaccess]
      enrichments: []
    read_by:
      enrichments: [conflict_scanning]
      queries: []

  form700_filings:
    layer: 2
    description: "Form 700 filing metadata (annual/assuming/leaving)"
    written_by:
      sources: [form700]
      enrichments: []
    read_by:
      enrichments: [conflict_scanning]
      queries: []

  economic_interests:
    layer: 2
    description: "Individual economic interest entries from Form 700"
    written_by:
      sources: [form700]
      enrichments: []
    read_by:
      enrichments: [conflict_scanning]
      queries: [getEconomicInterests]

  # ── Layer 2: Structured Core — Conflict Detection ───────────

  conflict_flags:
    layer: 2
    description: "Detected conflict-of-interest flags with confidence scores"
    written_by:
      sources: []
      enrichments: [conflict_scanning]
    read_by:
      enrichments: [comment_generation]
      queries: [getConflictFlags, getMeetingsWithFlags, getConflictFlagsDetailed,
                getFinancialConnectionsForOfficial, getAllFinancialConnectionSummaries,
                getMeetingStats]

  scan_runs:
    layer: 2
    description: "Scan execution metadata (mode, timing, flag counts)"
    written_by:
      sources: []
      enrichments: [conflict_scanning]
    read_by:
      enrichments: []
      queries: []

  # ── Layer 2: Structured Core — Public Records ───────────────

  nextrequest_requests:
    layer: 2
    description: "CPRA/public records requests"
    written_by:
      sources: [nextrequest]
      enrichments: []
    read_by:
      enrichments: []
      queries: [getPublicRecordsStats, getDepartmentCompliance, getRecentRequests]

  nextrequest_documents:
    layer: 2
    description: "Documents attached to public records requests"
    written_by:
      sources: [nextrequest]
      enrichments: []
    read_by:
      enrichments: []
      queries: []

  # ── Layer 2: Structured Core — Topics ──────────────────────

  topics:
    layer: 2
    description: "Dynamic civic topics (seeded from local issues, enriched by LLM)"
    written_by:
      sources: []
      enrichments: [topic_tagging]
    read_by:
      enrichments: [topic_tagging]
      queries: []

  item_topics:
    layer: 2
    description: "Junction: agenda items ↔ topics (many-to-many)"
    written_by:
      sources: []
      enrichments: [topic_tagging]
    read_by:
      enrichments: []
      queries: []

  # ── Layer 2: Structured Core — Commissions ──────────────────

  commissions:
    layer: 2
    description: "Commission/board metadata"
    written_by:
      sources: []
      enrichments: [commission_seeding]
    read_by:
      enrichments: []
      queries: [getCommissions, getCommission]

  commission_members:
    layer: 2
    description: "Commission member rosters with terms"
    written_by:
      sources: []
      enrichments: [commission_seeding]
    read_by:
      enrichments: []
      queries: [getCommissions, getCommission]

  bodies:
    layer: 2
    description: "Canonical body names (council, commissions, boards)"
    written_by:
      sources: []
      enrichments: [commission_seeding]
    read_by:
      enrichments: []
      queries: [getCommissionMeetings]

  # ── Layer 2: Structured Core — Socrata Open Data ────────────

  city_employees:
    layer: 2
    description: "City employee records from Socrata payroll"
    written_by:
      sources: [socrata_payroll]
      enrichments: []
    read_by:
      enrichments: []
      queries: []

  city_employee_pay:
    layer: 2
    description: "Employee compensation details"
    written_by:
      sources: [socrata_payroll]
      enrichments: []
    read_by:
      enrichments: []
      queries: []

  city_expenditures:
    layer: 2
    description: "City vendor payments from Socrata"
    written_by:
      sources: [socrata_expenditures]
      enrichments: []
    read_by:
      enrichments: [conflict_scanning]
      queries: []

  city_permits:
    layer: 2
    description: "Building permits from Socrata"
    written_by:
      sources: [socrata_permits]
      enrichments: []
    read_by:
      enrichments: [conflict_scanning]
      queries: []

  city_licenses:
    layer: 2
    description: "Business licenses from Socrata"
    written_by:
      sources: [socrata_licenses]
      enrichments: []
    read_by:
      enrichments: [conflict_scanning]
      queries: []

  city_code_cases:
    layer: 2
    description: "Code enforcement cases from Socrata"
    written_by:
      sources: [socrata_code_cases]
      enrichments: []
    read_by:
      enrichments: []
      queries: []

  city_service_requests:
    layer: 2
    description: "311 service requests from Socrata"
    written_by:
      sources: [socrata_service_requests]
      enrichments: []
    read_by:
      enrichments: []
      queries: []

  city_projects:
    layer: 2
    description: "Capital projects from Socrata"
    written_by:
      sources: [socrata_projects]
      enrichments: []
    read_by:
      enrichments: []
      queries: []

  court_records:
    layer: 2
    description: "Civil court case records"
    written_by:
      sources: [courts]
      enrichments: []
    read_by:
      enrichments: []
      queries: []

  # ── Layer 2: Structured Core — Organizations ────────────────

  organizations:
    layer: 2
    description: "Nonprofit organizations from ProPublica 990 data"
    written_by:
      sources: [propublica]
      enrichments: []
    read_by:
      enrichments: []
      queries: []

  entity_links:
    layer: 2
    description: "Cross-entity relationship links"
    written_by:
      sources: [propublica]
      enrichments: []
    read_by:
      enrichments: []
      queries: []

  behested_payments:
    layer: 2
    description: "FPPC Form 803 behested payment disclosures (S13.1)"
    written_by:
      sources: [form803_behested]
      enrichments: []
    read_by:
      enrichments: [conflict_scanner]
      queries: []

  lobbyist_registrations:
    layer: 2
    description: "City Clerk lobbyist registration records (S13.3)"
    written_by:
      sources: [lobbyist_registrations]
      enrichments: []
    read_by:
      enrichments: [conflict_scanner]
      queries: []

  business_entities:
    layer: 2
    description: "Resolved business entity registrations from OpenCorporates (CA SOS data)"
    written_by:
      sources: [opencorporates]
      enrichments: []
    read_by:
      enrichments: [conflict_scanner]
      queries: []

  business_entity_officers:
    layer: 2
    description: "Officers/directors/agents of resolved business entities"
    written_by:
      sources: [opencorporates]
      enrichments: []
    read_by:
      enrichments: [conflict_scanner]
      queries: []

  entity_name_matches:
    layer: 2
    description: "Bridge table linking source records (donors, permits) to resolved entities"
    written_by:
      sources: [opencorporates]
      enrichments: [conflict_scanner]
    read_by:
      enrichments: [conflict_scanner]
      queries: []

  opencorporates_api_usage:
    layer: operational
    description: "API call tracking for OpenCorporates rate limit management"
    written_by:
      sources: [opencorporates]
      enrichments: []
    read_by:
      enrichments: []
      queries: []

  # ── Operational Tables ──────────────────────────────────────

  data_sync_log:
    layer: operational
    description: "Per-source sync execution log (freshness tracking)"
    written_by:
      sources: ["*"]  # All sync sources write here
      enrichments: []
    read_by:
      enrichments: []
      queries: []
    api_routes: ["/api/data-freshness"]

  pipeline_journal:
    layer: operational
    description: "Append-only pipeline observation log"
    written_by:
      sources: []
      enrichments: [cloud_pipeline]
    read_by:
      enrichments: []
      queries: []

  user_feedback:
    layer: operational
    description: "Citizen feedback submissions"
    written_by:
      sources: []
      enrichments: []
    read_by:
      enrichments: []
      queries: []
    api_routes: ["/api/feedback"]

  # ── Views ───────────────────────────────────────────────────

  v_commission_staleness:
    layer: view
    description: "Commission roster staleness aggregation"
    base_tables: [commissions, commission_members]
    read_by:
      queries: [getCommissionStaleness]


# ══════════════════════════════════════════════════════════════
# ENRICHMENTS — Processing stages that transform data
# ══════════════════════════════════════════════════════════════

enrichments:
  minutes_extraction:
    module: batch_extract.py
    description: "AI extraction of structured meeting data from raw PDFs"
    reads_from: [documents]
    writes_to: [extraction_runs, meetings, agenda_items, motions, votes,
                meeting_attendance, closed_session_items, public_comments,
                friendly_amendments]
    uses_api: "Claude Sonnet"
    cost_per_unit: "$0.06/meeting"

  form700_extraction:
    module: form700_scraper.py
    description: "AI extraction of Form 700 economic interest data"
    reads_from: [documents]
    writes_to: [form700_filings, economic_interests]
    uses_api: "Claude Sonnet"

  contributor_classification:
    module: contributor_classifier.py
    description: "Classify contributors as corporate/union/individual/pac_ie/other from ENTITY_CD or name patterns"
    reads_from: [contributions, donors]
    writes_to: [contributions]
    columns_written: [contributor_type, contributor_type_source, entity_code]

  topic_tagging:
    module: topic_tagger.py
    description: "Keyword-based topic assignment for agenda items (14 Richmond local issues)"
    reads_from: [agenda_items, topics]
    writes_to: [item_topics]

  conflict_scanning:
    module: conflict_scanner.py
    description: "Multi-signal conflict-of-interest detection"
    reads_from: [meetings, meeting_attendance, agenda_items, contributions,
                 economic_interests, city_expenditures, independent_expenditures,
                 city_permits, city_licenses]
    writes_to: [conflict_flags, scan_runs]
    signal_detectors:
      - campaign_contribution
      - form700_property
      - form700_income
      - donor_vendor_expenditure
      - temporal_correlation

  comment_generation:
    module: comment_generator.py
    description: "Public comment generation from conflict scan results"
    reads_from: [conflict_flags]
    writes_to: [public_comments]
    uses_api: "Claude Sonnet"

  summary_generation:
    module: generate_summaries.py
    description: "Plain-language agenda item summaries and headlines"
    reads_from: [agenda_items]
    writes_to: [agenda_items]  # Updates plain_language_summary + summary_headline columns
    uses_api: "Claude Sonnet"
    batch_runner: batch_summarize.py  # R1 bulk regeneration via Batch API

  vote_explainer_generation:
    module: generate_vote_explainers.py
    description: "Plain-language vote/motion explainers"
    reads_from: [motions]
    writes_to: [motions]  # Updates vote_explainer column
    uses_api: "Claude Sonnet"

  bio_generation:
    module: bio_generator.py
    description: "AI-generated official biographical summaries"
    reads_from: [officials]
    writes_to: [officials]  # Updates bio_summary column
    uses_api: "Claude Sonnet"

  commission_seeding:
    module: seed_commissions.py
    description: "Commission roster seeding from ground truth + scraping"
    reads_from: []
    writes_to: [commissions, commission_members, bodies, officials]

  cloud_pipeline:
    module: cloud_pipeline.py
    description: "Full pipeline orchestrator (scrape → extract → scan → generate)"
    reads_from: [documents, contributions, meetings, agenda_items]
    writes_to: [meetings, agenda_items, conflict_flags, scan_runs,
                public_comments, pipeline_journal]
    orchestrates:
      - escribemeetings  # scrape step
      - conflict_scanning
      - comment_generation
      - summary_generation
      - vote_explainer_generation


# ══════════════════════════════════════════════════════════════
# QUERIES — Frontend query functions → tables they read
# ══════════════════════════════════════════════════════════════

queries:
  # ── Meetings ────────────────────────────────────────────────
  getMeetings:
    file: queries.ts
    tables: [meetings]
    used_by: []  # Internal helper — called by getMeetingsWithCounts, not used directly by pages

  getMeetingsWithCounts:
    file: queries.ts
    tables: [meetings]  # Uses RPC get_meeting_counts
    used_by: ["/"]

  getMeeting:
    file: queries.ts
    tables: [meetings, agenda_items, motions, votes, meeting_attendance,
             closed_session_items]
    used_by: ["/meetings/[id]"]

  # ── Officials ───────────────────────────────────────────────
  getOfficials:
    file: queries.ts
    tables: [officials]
    used_by: ["/council"]

  getOfficialBySlug:
    file: queries.ts
    tables: [officials]  # Uses slug derived from name
    used_by: ["/council/[slug]"]

  getOfficialVotingRecord:
    file: queries.ts
    tables: [votes]
    used_by: ["/council/[slug]"]

  getTopDonors:
    file: queries.ts
    tables: [committees, contributions, donors]
    used_by: ["/council/[slug]", "/financial-connections"]

  getEconomicInterests:
    file: queries.ts
    tables: [economic_interests]
    used_by: ["/council/[slug]"]

  getOfficialWithStats:
    file: queries.ts
    tables: [officials, votes, meeting_attendance]
    used_by: ["/council/[slug]"]

  getOfficialCategoryBreakdown:
    file: queries.ts
    tables: [votes]
    used_by: ["/council/[slug]"]

  getMeetingStats:
    file: queries.ts
    tables: [meetings, agenda_items, votes, contributions, conflict_flags]
    used_by: ["/council/stats"]

  # ── Conflict Analysis ──────────────────────────────────────
  getConflictFlags:
    file: queries.ts
    tables: [conflict_flags]
    used_by: ["/reports/[meetingId]"]

  getAttendance:
    file: queries.ts
    tables: [meeting_attendance]
    used_by: ["/meetings/[id]"]

  getMeetingsWithFlags:
    file: queries.ts
    tables: [conflict_flags, meetings, agenda_items]
    used_by: ["/reports/[meetingId]"]

  getMeetingFlagCounts:
    file: queries.ts
    tables: [conflict_flags]
    used_by: ["/meetings"]

  getAgendaItemsByCategory:
    file: queries.ts
    tables: [agenda_items, meetings]
    used_by: ["/meetings/category/[slug]"]

  getConflictFlagsDetailed:
    file: queries.ts
    tables: [conflict_flags]
    used_by: ["/reports/[meetingId]"]

  getMeetingForReport:
    file: queries.ts
    tables: [meetings, agenda_items]
    used_by: ["/reports/[meetingId]"]

  getFinancialConnectionsForOfficial:
    file: queries.ts
    tables: [conflict_flags, motions]
    used_by: ["/financial-connections"]

  getAllFinancialConnectionSummaries:
    file: queries.ts
    tables: [conflict_flags, motions, officials]
    used_by: ["/financial-connections"]

  # ── Influence Map ────────────────────────────────────────────
  getAgendaItemBasic:
    file: queries.ts
    tables: [agenda_items, meetings]
    used_by: ["/influence/item/[id]"]

  getItemInfluenceMapData:
    file: queries.ts
    tables: [agenda_items, meetings, conflict_flags, motions, votes,
             officials, committees, contributions, donors,
             behested_payments]
    used_by: ["/influence/item/[id]"]

  # ── Public Records ──────────────────────────────────────────
  getPublicRecordsStats:
    file: queries.ts
    tables: [nextrequest_requests]
    used_by: ["/public-records"]

  getDepartmentCompliance:
    file: queries.ts
    tables: [nextrequest_requests]
    used_by: ["/public-records"]

  getRecentRequests:
    file: queries.ts
    tables: [nextrequest_requests]
    used_by: ["/public-records"]

  getAllPublicRecords:
    file: queries.ts
    tables: [nextrequest_requests]
    used_by: ["/public-records"]

  # ── Commissions ─────────────────────────────────────────────
  getCommissions:
    file: queries.ts
    tables: [commissions, commission_members]
    used_by: ["/commissions"]

  getCommission:
    file: queries.ts
    tables: [commissions, commission_members]
    used_by: ["/commissions/[id]"]

  getCommissionStaleness:
    file: queries.ts
    tables: [v_commission_staleness]
    used_by: ["/commissions"]

  getCommissionMeetings:
    file: queries.ts
    tables: [bodies, meetings]
    used_by: ["/commissions/[id]"]

  # ── Voting Patterns ─────────────────────────────────────────
  getCategoryStats:
    file: queries.ts
    tables: [agenda_items]
    used_by: ["/council/stats"]

  getControversialItems:
    file: queries.ts
    tables: [agenda_items]
    used_by: ["/council/stats"]

  getCoalitionData:
    file: queries.ts
    tables: [officials, meetings, votes]
    used_by: ["/council/coalitions"]

  getCrossMeetingPatterns:
    file: queries.ts
    tables: [officials, committees, contributions, meetings, votes]
    used_by: ["/council/patterns"]

  # ── Search ──────────────────────────────────────────────────
  searchSite:
    file: queries.ts
    tables: [meetings, agenda_items, officials]  # Full-text + semantic
    used_by: ["/search"]

  # ── Utility (not async, no direct table access) ─────────────
  buildOfficialConnectionSummary:
    file: queries.ts
    tables: []  # Transforms data from other queries
    used_by: ["/financial-connections"]

  officialToSlug:
    file: queries.ts
    tables: []  # Pure string transform
    used_by: ["/council"]

  parseVoteTally:
    file: queries.ts
    tables: []  # Pure string parser
    used_by: ["/meetings/[id]"]


# ══════════════════════════════════════════════════════════════
# PAGES — Frontend routes → queries used
# ══════════════════════════════════════════════════════════════

pages:
  "/":
    description: "Home — upcoming meetings with summary counts"
    queries: [getMeetingsWithCounts]

  "/meetings":
    description: "Meeting discovery — month-grouped list, mini-calendar, calendar grid toggle"
    queries: [getMeetingsWithCounts, getMeetingFlagCounts]

  "/meetings/[id]":
    description: "Meeting detail — agenda items, votes, attendance"
    queries: [getMeeting, getAttendance, parseVoteTally]

  "/meetings/category/[slug]":
    description: "Category drill-through — all agenda items in a category"
    queries: [getAgendaItemsByCategory]

  "/council":
    description: "Council member grid"
    queries: [getOfficials, officialToSlug]

  "/council/[slug]":
    description: "Council member profile — bio, voting record, donors, interests"
    queries: [getOfficialBySlug, getOfficialVotingRecord, getTopDonors,
              getEconomicInterests, getOfficialWithStats, getOfficialCategoryBreakdown]

  "/council/stats":
    description: "Voting statistics and patterns"
    queries: [getMeetingStats, getCategoryStats, getControversialItems]

  "/council/coalitions":
    description: "Pairwise voting alignment analysis"
    queries: [getCoalitionData]

  "/council/patterns":
    description: "Cross-meeting voting patterns and donor overlap"
    queries: [getCrossMeetingPatterns]

  "/reports":
    description: "Transparency reports list — meetings with conflict flags"
    queries: [getMeetingsWithFlags, getConflictFlags]

  "/reports/[meetingId]":
    description: "Transparency report — conflict flags by meeting"
    queries: [getMeetingsWithFlags, getConflictFlagsDetailed, getMeetingForReport,
              getConflictFlags]

  "/influence/item/[id]":
    description: "Influence map — agenda item center with contribution narratives, votes, behested payments, related decisions"
    queries: [getItemInfluenceMapData, getAgendaItemBasic]

  "/influence/methodology":
    description: "Influence analysis methodology and disclaimer page"
    queries: []

  "/financial-connections":
    description: "Council-donor network and financial connections"
    queries: [getFinancialConnectionsForOfficial, getAllFinancialConnectionSummaries,
              getTopDonors, buildOfficialConnectionSummary]

  "/commissions":
    description: "Commission index with rosters and staleness"
    queries: [getCommissions, getCommissionStaleness]

  "/commissions/[id]":
    description: "Commission detail — members, meetings, history"
    queries: [getCommission, getCommissionMeetings]

  "/public-records":
    description: "CPRA compliance dashboard"
    queries: [getPublicRecordsStats, getDepartmentCompliance, getRecentRequests]

  "/search":
    description: "Full-text and semantic search"
    queries: [searchSite]

  "/data-quality":
    description: "Data freshness and quality monitoring"
    queries: []
    api_routes: ["/api/health", "/api/data-freshness"]

  "/about":
    description: "Methodology, source tiers, disclaimers"
    queries: []  # Static content

  "/operator/decisions":
    description: "Operator decision queue (operator-only)"
    queries: []
    api_routes: ["/api/operator/decisions"]

  "/operator/sync-health":
    description: "Pipeline sync health dashboard (operator-only)"
    queries: []
    api_routes: ["/api/operator/sync-health"]


# ══════════════════════════════════════════════════════════════
# SCHEDULES — Cloud workflows and their triggers
# ══════════════════════════════════════════════════════════════

schedules:
  cloud-pipeline.yml:
    description: "Full meeting pipeline: scrape → scan → comment → generate"
    triggers:
      - type: cron
        schedule: "0 6 * * 1"  # Monday 6am UTC (Sunday 10pm Pacific)
        description: "Weekly pre-meeting pipeline"
      - type: cron
        schedule: "0 8 1 1,4,7,10 *"  # Quarterly
        description: "Quarterly retrospective scan"
      - type: repository_dispatch
        description: "n8n webhook trigger"
      - type: workflow_dispatch
        description: "Manual trigger"
    sources_triggered: [escribemeetings]
    enrichments_triggered: [conflict_scanning, comment_generation,
                            summary_generation, vote_explainer_generation]

  data-sync.yml:
    description: "Scheduled data source syncs (4-tier cadence)"
    triggers:
      - type: cron
        schedule: "0 7 * * *"  # Daily 7am UTC
        description: "Daily: nextrequest (CPRA compliance)"
      - type: cron
        schedule: "0 8 * * 1"  # Monday 8am UTC
        description: "Weekly: archive_center, minutes_extraction, escribemeetings, netfile, socrata_expenditures, socrata_payroll"
      - type: cron
        schedule: "0 9 15 * *"  # 15th of month 9am UTC
        description: "Monthly: calaccess, socrata_permits, socrata_licenses, socrata_code_cases, socrata_service_requests, socrata_projects"
      - type: cron
        schedule: "0 10 1 1,4,7,10 *"  # Quarterly 10am UTC
        description: "Quarterly: form700, form803_behested, lobbyist_registrations, propublica"
      - type: repository_dispatch
        description: "n8n webhook trigger"
      - type: workflow_dispatch
        description: "Manual single-source sync (all 17 sources)"
    sources_triggered: [netfile, calaccess, escribemeetings, nextrequest,
                        archive_center, minutes_extraction, form700,
                        form803_behested, lobbyist_registrations, propublica,
                        socrata_payroll, socrata_expenditures, socrata_permits,
                        socrata_licenses, socrata_code_cases,
                        socrata_service_requests, socrata_projects]

  data-quality.yml:
    description: "Data quality checks"
    triggers:
      - type: cron
        schedule: "0 7 * * *"  # Daily 7am UTC
        description: "Daily quality check"
      - type: cron
        schedule: "0 12 * * 5"  # Friday noon UTC
        description: "Weekly deep quality check"
      - type: workflow_dispatch
        description: "Manual trigger"
    sources_triggered: []
    enrichments_triggered: []

  self-assessment.yml:
    description: "System health and self-assessment"
    triggers:
      - type: cron
        schedule: "0 7 * * *"  # Daily 7am UTC
        description: "Daily health check"
      - type: cron
        schedule: "0 12 * * 5"  # Friday noon UTC
        description: "Weekly deep assessment"
      - type: workflow_dispatch
        description: "Manual trigger"
    sources_triggered: []
    enrichments_triggered: []

  test.yml:
    description: "Pytest CI on pull requests"
    triggers:
      - type: pull_request
        description: "Runs on PR to main"
    sources_triggered: []
    enrichments_triggered: []


# ══════════════════════════════════════════════════════════════
# N8N WORKFLOWS — External orchestration schedules
# ══════════════════════════════════════════════════════════════

n8n_workflows:
  weekly_sync:
    schedule: "Sunday 10pm Pacific"
    dispatches: data-sync.yml
    sources: [netfile, calaccess, escribemeetings]

  monthly_calaccess:
    schedule: "1st Monday of month"
    dispatches: data-sync.yml
    sources: [calaccess]

  pre_meeting_pipeline:
    schedule: "Monday 6am UTC"
    dispatches: cloud-pipeline.yml
    sources: [escribemeetings]

  post_sync_retrospective:
    schedule: "After weekly_sync completes"
    dispatches: cloud-pipeline.yml
    mode: retrospective


# ══════════════════════════════════════════════════════════════
# RPCS — Supabase server-side SQL functions
# ══════════════════════════════════════════════════════════════

rpcs:
  get_meeting_counts:
    migration: "038"
    reads_from: [meetings, agenda_items, motions, votes]
    returns: "{meeting_id, agenda_item_count, vote_count, categories[]}"
    used_by_queries: [getMeetingsWithCounts, getCommissionMeetings]

  get_category_stats:
    migration: "038"
    reads_from: [agenda_items, motions, votes, public_comments]
    returns: "{category, item_count, vote_count, split_vote_count, unanimous_vote_count, avg_controversy_score, total_public_comments, percentage_of_agenda}"
    used_by_queries: [getCategoryStats]

  get_controversial_items:
    migration: "038"
    reads_from: [agenda_items, motions, votes, public_comments]
    returns: "{agenda_item_id, meeting_id, meeting_date, item_number, title, category, controversy_score, vote_tally, result, public_comment_count, motion_count}"
    used_by_queries: [getControversialItems]

  get_contested_votes:
    migration: "038"
    reads_from: [votes, motions, agenda_items, meetings]
    returns: "{motion_id, official_id, official_name, vote_choice, category}"
    used_by_queries: [getCoalitionData]

  get_meeting_coverage_stats:
    migration: "038"
    reads_from: [meetings, agenda_items, motions, votes, meeting_attendance]
    returns: "meeting coverage aggregation"
    used_by_queries: []
    used_by_api_routes: ["/api/data-quality"]

  search_site:
    migration: "039"
    reads_from: [meetings, agenda_items, officials]
    returns: "full-text + semantic search results"
    used_by_queries: [searchSite]


# ══════════════════════════════════════════════════════════════
# API ROUTES — Next.js routes that bypass queries.ts
# ══════════════════════════════════════════════════════════════

api_routes:
  "/api/health":
    file: "web/src/app/api/health/route.ts"
    method: GET
    tables_read: [cities, officials, meetings, agenda_items, motions, votes,
                  contributions, documents, conflict_flags, scan_runs,
                  data_sync_log, user_feedback, nextrequest_requests,
                  nextrequest_documents, commissions, commission_members]
    description: "Migration health check — probes table existence"
    used_by_pages: ["/data-quality"]

  "/api/data-freshness":
    file: "web/src/app/api/data-freshness/route.ts"
    method: GET
    tables_read: [data_sync_log]
    description: "Per-source sync freshness"
    used_by_pages: ["/data-quality"]

  "/api/data-quality":
    file: "web/src/app/api/data-quality/route.ts"
    method: GET
    tables_read: [data_sync_log, meetings, agenda_items, motions, votes, meeting_attendance]
    rpcs_called: [get_meeting_coverage_stats]
    description: "Data quality metrics and meeting coverage stats"
    used_by_pages: ["/data-quality"]

  "/api/flag-details":
    file: "web/src/app/api/flag-details/route.ts"
    method: GET
    tables_read: [conflict_flags, meetings, agenda_items, officials, motions, votes]
    description: "Expanded conflict flag detail with vote context"
    used_by_pages: ["/reports/[meetingId]"]

  "/api/feedback":
    file: "web/src/app/api/feedback/route.ts"
    method: POST
    tables_written: [user_feedback]
    description: "Citizen feedback submission (rate-limited)"
    used_by_pages: ["*"]

  "/api/search":
    file: "web/src/app/api/search/route.ts"
    method: GET
    rpcs_called: [search_site]
    description: "Full-text + semantic search"
    used_by_pages: ["/search"]

  "/api/public-records":
    file: "web/src/app/api/public-records/route.ts"
    method: GET
    description: "CPRA compliance stats (delegates to queries.ts)"
    used_by_pages: ["/public-records"]

  "/api/operator/decisions":
    file: "web/src/app/api/operator/decisions/route.ts"
    method: GET
    tables_read: [pending_decisions]
    description: "Operator decision queue (operator-only)"
    used_by_pages: ["/operator/decisions"]

  "/api/operator/sync-health":
    file: "web/src/app/api/operator/sync-health/route.ts"
    method: GET
    tables_read: [data_sync_log]
    description: "Pipeline sync health per source (operator-only)"
    used_by_pages: ["/operator/sync-health"]


# ══════════════════════════════════════════════════════════════
# FIELD MAP — End-to-end: visible field → source pipeline
#
# Format: page → field label → query/API → table.column → source
# Use `pipeline_map.py trace field:<field_name>` to trace any field.
#
# This is the section that answers: "This field shows 0 — what do
# I need to rerun?" Trace backward from the field to the source.
# ══════════════════════════════════════════════════════════════

field_map:

  # ── Home Page (/) ───────────────────────────────────────────

  "/":
    "meeting date":
      query: getMeetingsWithCounts
      column: meetings.meeting_date
      sources: [escribemeetings, minutes_extraction]

    "meeting type":
      query: getMeetingsWithCounts
      column: meetings.meeting_type
      sources: [escribemeetings, minutes_extraction]

    "agenda item count":
      query: getMeetingsWithCounts
      rpc: get_meeting_counts
      column: "COUNT(agenda_items.meeting_id)"
      sources: [escribemeetings, minutes_extraction]

    "vote count":
      query: getMeetingsWithCounts
      rpc: get_meeting_counts
      column: "COUNT(votes via motions)"
      sources: [minutes_extraction]

    "top categories":
      query: getMeetingsWithCounts
      rpc: get_meeting_counts
      column: agenda_items.category
      sources: [escribemeetings, minutes_extraction]
      enrichment: "rules-based categorization in load_meeting_to_db"

    "stats bar counts":
      query: getMeetingStats
      column: "COUNT(meetings, agenda_items, votes, contributions, conflict_flags)"
      sources: [escribemeetings, minutes_extraction, netfile, calaccess]
      enrichment: conflict_scanning

    "latest meeting flags":
      query: getConflictFlags
      column: "conflict_flags.* for latest meeting"
      sources: []
      enrichment: conflict_scanning

  # ── Meeting List (/meetings) ────────────────────────────────

  "/meetings":
    "meeting date":
      query: getMeetingsWithCounts
      column: meetings.meeting_date
      sources: [escribemeetings, minutes_extraction]

    "meeting type":
      query: getMeetingsWithCounts
      column: meetings.meeting_type
      sources: [escribemeetings, minutes_extraction]

    "body name":
      query: getMeetingsWithCounts
      column: meetings.body_name
      sources: [escribemeetings]

    "meeting agenda item count":
      query: getMeetingsWithCounts
      rpc: get_meeting_counts
      column: "COUNT(agenda_items.meeting_id)"
      sources: [escribemeetings, minutes_extraction]

    "per-meeting flag counts":
      query: getMeetingFlagCounts
      column: "COUNT(conflict_flags) GROUP BY meeting_id"
      sources: []
      enrichment: conflict_scanning

  # ── Meeting Detail (/meetings/[id]) ─────────────────────────

  "/meetings/[id]":
    "agenda item title":
      query: getMeeting
      column: agenda_items.title
      sources: [escribemeetings, minutes_extraction]

    "agenda item description":
      query: getMeeting
      column: agenda_items.description
      sources: [escribemeetings]

    "plain language summary":
      query: getMeeting
      column: agenda_items.plain_language_summary
      sources: []
      enrichment: summary_generation

    "summary headline":
      query: getMeeting
      column: agenda_items.summary_headline
      sources: []
      enrichment: summary_generation

    "item category":
      query: getMeeting
      column: agenda_items.category
      sources: [escribemeetings, minutes_extraction]
      enrichment: "rules-based categorization"

    "motion text":
      query: getMeeting
      column: motions.motion_text
      sources: [minutes_extraction]

    "motion result":
      query: getMeeting
      column: motions.result
      sources: [minutes_extraction]

    "vote tally":
      query: getMeeting
      column: motions.vote_tally
      sources: [minutes_extraction]

    "vote explainer":
      query: getMeeting
      column: motions.vote_explainer
      sources: []
      enrichment: vote_explainer_generation

    "individual votes":
      query: getMeeting
      column: votes.vote_choice
      sources: [minutes_extraction]

    "voter name":
      query: getMeeting
      column: votes.official_name
      sources: [minutes_extraction]

    "attendance status":
      query: getMeeting
      column: meeting_attendance.status
      sources: [minutes_extraction]

    "closed session items":
      query: getMeeting
      column: closed_session_items.title
      sources: [minutes_extraction]

    "attendance list":
      query: getAttendance
      column: "meeting_attendance.status + officials.name"
      sources: [minutes_extraction]

    "meeting conflict flags":
      query: getConflictFlags
      column: "conflict_flags.* for this meeting"
      sources: []
      enrichment: conflict_scanning

  # ── Council Grid (/council) ─────────────────────────────────

  "/council":
    "council member name":
      query: getOfficials
      column: officials.name
      sources: []
      enrichment: commission_seeding
      note: "Seeded from ground_truth/officials.json"

    "role":
      query: getOfficials
      column: officials.role
      sources: []
      enrichment: commission_seeding

    "is current":
      query: getOfficials
      column: officials.is_current
      sources: []
      enrichment: commission_seeding

  # ── Council Profile (/council/[slug]) ───────────────────────

  "/council/[slug]":
    "bio summary":
      query: getOfficialBySlug
      column: officials.bio_summary
      sources: []
      enrichment: bio_generation

    "bio factual":
      query: getOfficialBySlug
      column: officials.bio_factual
      sources: []
      enrichment: bio_generation

    "vote count":
      query: getOfficialWithStats
      column: "COUNT(votes.id)"
      sources: [minutes_extraction]

    "attendance rate":
      query: getOfficialWithStats
      column: "meeting_attendance.status aggregation"
      sources: [minutes_extraction]

    "voting record":
      query: getOfficialVotingRecord
      column: "votes + motions + agenda_items + meetings (joined)"
      sources: [minutes_extraction, escribemeetings]

    "top donor name":
      query: getTopDonors
      column: donors.name
      sources: [netfile, calaccess]

    "top donor amount":
      query: getTopDonors
      column: "SUM(contributions.amount)"
      sources: [netfile, calaccess]

    "top donor employer":
      query: getTopDonors
      column: donors.employer
      sources: [netfile, calaccess]

    "category breakdown":
      query: getOfficialCategoryBreakdown
      column: "votes + motions + agenda_items.category"
      sources: [minutes_extraction, escribemeetings]

    "economic interest type":
      query: getEconomicInterests
      column: economic_interests.interest_type
      sources: [form700]

    "economic interest description":
      query: getEconomicInterests
      column: economic_interests.description
      sources: [form700]

    "economic interest value range":
      query: getEconomicInterests
      column: economic_interests.value_range
      sources: [form700]

    "filing year":
      query: getEconomicInterests
      column: economic_interests.filing_year
      sources: [form700]

    "statement type":
      query: getEconomicInterests
      column: form700_filings.statement_type
      sources: [form700]

    "financial connections":
      query: getFinancialConnectionsForOfficial
      column: "conflict_flags + motions + votes for this official"
      sources: [netfile, calaccess, escribemeetings, minutes_extraction, form700]
      enrichment: conflict_scanning

  # ── Voting Stats (/council/stats) ───────────────────────────

  "/council/stats":
    "total meetings count":
      query: getMeetingStats
      column: "COUNT(meetings.id)"
      sources: [escribemeetings, minutes_extraction]

    "total agenda items count":
      query: getMeetingStats
      column: "COUNT(agenda_items.id)"
      sources: [escribemeetings, minutes_extraction]

    "total votes count":
      query: getMeetingStats
      column: "COUNT(votes.id)"
      sources: [minutes_extraction]

    "total contributions count":
      query: getMeetingStats
      column: "COUNT(contributions.id)"
      sources: [netfile, calaccess]

    "total conflict flags count":
      query: getMeetingStats
      column: "COUNT(conflict_flags.id)"
      sources: [netfile, calaccess, escribemeetings, minutes_extraction, form700]
      enrichment: conflict_scanning

    "category stats":
      query: getCategoryStats
      rpc: get_category_stats
      column: "agenda_items.category + votes + public_comments aggregation"
      sources: [escribemeetings, minutes_extraction]

    "controversial items":
      query: getControversialItems
      rpc: get_controversial_items
      column: "agenda_items + motions + votes + public_comments scored"
      sources: [escribemeetings, minutes_extraction]

  # ── Coalition Analysis (/council/coalitions) ────────────────

  "/council/coalitions":
    "pairwise agreement rate":
      query: getCoalitionData
      rpc: get_contested_votes
      column: "votes.vote_choice pairwise comparison on contested motions"
      sources: [minutes_extraction]

    "voting bloc members":
      query: getCoalitionData
      column: "officials.name (filtered to is_current council)"
      sources: [minutes_extraction]
      enrichment: commission_seeding
      note: "Bloc detection uses STRONG_BLOC_THRESHOLD=0.85, MODERATE=0.70"

    "category divergences":
      query: getCoalitionData
      column: "agenda_items.category × votes.vote_choice"
      sources: [minutes_extraction, escribemeetings]

  # ── Cross-Meeting Patterns (/council/patterns) ──────────────

  "/council/patterns":
    "cross-meeting voting patterns":
      query: getCrossMeetingPatterns
      column: "officials + committees + contributions + meetings + votes (multi-table)"
      sources: [minutes_extraction, netfile, calaccess]
      enrichment: commission_seeding

  # ── Transparency Reports List (/reports) ─────────────────────

  "/reports":
    "meetings with flags":
      query: getMeetingsWithFlags
      column: "conflict_flags grouped by meeting_id + meetings.*"
      sources: [netfile, calaccess, escribemeetings, minutes_extraction, form700]
      enrichment: conflict_scanning

    "conflict flags list":
      query: getConflictFlags
      column: "conflict_flags.* where is_current = true"
      sources: []
      enrichment: conflict_scanning

  # ── Transparency Report Detail (/reports/[meetingId]) ───────

  "/reports/[meetingId]":
    "report meeting info":
      query: getMeetingForReport
      column: "meetings.meeting_date + COUNT(agenda_items)"
      sources: [escribemeetings, minutes_extraction]

    "meetings with flag counts":
      query: getMeetingsWithFlags
      column: "conflict_flags.confidence aggregated by meeting_id"
      sources: [netfile, calaccess, escribemeetings, minutes_extraction, form700]
      enrichment: conflict_scanning

    "items scanned count":
      query: getMeetingsWithFlags
      column: "COUNT(agenda_items.meeting_id)"
      sources: [escribemeetings, minutes_extraction]

    "flag confidence":
      query: getConflictFlagsDetailed
      column: conflict_flags.confidence
      sources: []
      enrichment: conflict_scanning

    "flag type":
      query: getConflictFlagsDetailed
      column: conflict_flags.flag_type
      sources: []
      enrichment: conflict_scanning

    "flag description":
      query: getConflictFlagsDetailed
      column: conflict_flags.description
      sources: []
      enrichment: conflict_scanning

    "flag evidence":
      query: getConflictFlagsDetailed
      column: conflict_flags.evidence
      sources: []
      enrichment: conflict_scanning

    "flagged official name":
      query: getConflictFlagsDetailed
      column: officials.name
      sources: []
      enrichment: commission_seeding

    "flagged agenda item":
      query: getConflictFlagsDetailed
      column: "agenda_items.title + agenda_items.item_number"
      sources: [escribemeetings, minutes_extraction]

    "flag detail expansion":
      api_route: "/api/flag-details"
      column: "conflict_flags + motions + votes (batch joined)"
      sources: [minutes_extraction]
      enrichment: conflict_scanning

  # ── Financial Connections (/financial-connections) ───────────

  "/financial-connections":
    "official connection summary":
      query: getAllFinancialConnectionSummaries
      column: "conflict_flags + officials + meetings + agenda_items + motions + votes"
      sources: [netfile, calaccess, escribemeetings, minutes_extraction, form700]
      enrichment: conflict_scanning

    "per-official connections":
      query: getFinancialConnectionsForOfficial
      column: "conflict_flags + motions + votes for single official"
      sources: [netfile, calaccess, escribemeetings, minutes_extraction, form700]
      enrichment: conflict_scanning

    "voted in favor count":
      query: buildOfficialConnectionSummary
      column: "votes.vote_choice filtered to aye on contested motions"
      sources: [minutes_extraction]

    "flag type breakdown":
      query: buildOfficialConnectionSummary
      column: conflict_flags.flag_type
      sources: []
      enrichment: conflict_scanning

    "donor top donors":
      query: getTopDonors
      column: "donors.name + SUM(contributions.amount)"
      sources: [netfile, calaccess]

  # ── Commission Index (/commissions) ─────────────────────────

  "/commissions":
    "commission name":
      query: getCommissions
      column: commissions.name
      sources: []
      enrichment: commission_seeding

    "member count":
      query: getCommissions
      column: "COUNT(commission_members where is_current)"
      sources: []
      enrichment: commission_seeding

    "holdover count":
      query: getCommissions
      column: "COUNT(commission_members where term_end < today)"
      sources: []
      enrichment: commission_seeding

    "vacancy count":
      query: getCommissions
      column: "commissions.num_seats - active_count"
      sources: []
      enrichment: commission_seeding

    "staleness":
      query: getCommissionStaleness
      column: v_commission_staleness.*
      sources: []
      enrichment: commission_seeding

  # ── Commission Detail (/commissions/[id]) ───────────────────

  "/commissions/[id]":
    "member name":
      query: getCommission
      column: commission_members.name
      sources: []
      enrichment: commission_seeding

    "member role":
      query: getCommission
      column: commission_members.role
      sources: []
      enrichment: commission_seeding

    "term start/end":
      query: getCommission
      column: "commission_members.term_start + term_end"
      sources: []
      enrichment: commission_seeding

    "commission meetings":
      query: getCommissionMeetings
      column: "meetings via bodies.commission_id"
      sources: [escribemeetings, minutes_extraction]

    "commission staleness detail":
      query: getCommissionStaleness
      column: v_commission_staleness.*
      sources: []
      enrichment: commission_seeding

  # ── Public Records (/public-records) ────────────────────────

  "/public-records":
    "total requests":
      query: getPublicRecordsStats
      column: "COUNT(nextrequest_requests)"
      sources: [nextrequest]

    "avg response days":
      query: getPublicRecordsStats
      column: "AVG(nextrequest_requests.days_to_close)"
      sources: [nextrequest]

    "on time rate":
      query: getPublicRecordsStats
      column: "nextrequest_requests.days_to_close <= 10"
      sources: [nextrequest]

    "currently overdue":
      query: getPublicRecordsStats
      column: "nextrequest_requests.status + submitted_date"
      sources: [nextrequest]

    "department compliance":
      query: getDepartmentCompliance
      column: "nextrequest_requests grouped by department"
      sources: [nextrequest]

    "recent requests":
      query: getRecentRequests
      column: "nextrequest_requests.*"
      sources: [nextrequest]

    "all public records":
      query: getAllPublicRecords
      column: "nextrequest_requests.* (paginated)"
      sources: [nextrequest]

  # ── Search (/search) ────────────────────────────────────────

  "/search":
    "search results":
      query: searchSite
      rpc: search_site
      column: "meetings + agenda_items + officials (full-text + semantic)"
      sources: [escribemeetings, minutes_extraction]
      enrichment: commission_seeding

  # ── Data Quality (/data-quality) ────────────────────────────

  "/data-quality":
    "source freshness":
      api_route: "/api/data-freshness"
      column: data_sync_log.completed_at
      sources: ["*"]
      note: "Every sync source writes to data_sync_log"

    "migration health":
      api_route: "/api/health"
      column: "table existence probes"
      sources: []

    "meeting coverage":
      api_route: "/api/data-quality"
      rpc: get_meeting_coverage_stats
      column: "meetings + agenda_items + motions + votes aggregation"
      sources: [escribemeetings, minutes_extraction]

  # ── Influence Map (/influence/item/[id]) ────────────────────

  "/influence/item/[id]":
    "agenda item title":
      query: getAgendaItemBasic
      column: agenda_items.title
      sources: [escribemeetings, minutes_extraction]

    "contribution narrative":
      query: getItemInfluenceMapData
      column: "conflict_flags + contributions + donors + motions + votes"
      sources: [netfile, calaccess, minutes_extraction]
      enrichment: conflict_scanning

    "behested payments":
      query: getItemInfluenceMapData
      column: "behested_payments.* for matching agenda text"
      sources: [form803_behested]

    "related decisions":
      query: getItemInfluenceMapData
      column: "agenda_items with matching category (4-year window)"
      sources: [escribemeetings, minutes_extraction]

  "/influence/methodology":
    "methodology text":
      query: null
      column: "static content (no database queries)"
      sources: []
      note: "Hardcoded methodology and disclaimer text"

  # ── Category Drill-Through (/meetings/category/[slug]) ─────

  "/meetings/category/[slug]":
    "category items":
      query: getAgendaItemsByCategory
      column: "agenda_items.* WHERE category = slug"
      sources: [escribemeetings, minutes_extraction]

  # ── Operator Sync Health (/operator/sync-health) ────────────

  "/operator/sync-health":
    "sync source status":
      api_route: "/api/operator/sync-health"
      column: "data_sync_log per source (freshness, status, records)"
      sources: ["*"]
      note: "Every sync source writes to data_sync_log"

  # ── Operator Decisions (/operator/decisions) ────────────────

  "/operator/decisions":
    "pending decisions":
      api_route: "/api/operator/decisions"
      column: "pending_decisions.* (severity, type, title, description)"
      sources: []
      note: "Written by pipeline self-assessment and data quality checks"

    "decision severity":
      api_route: "/api/operator/decisions"
      column: pending_decisions.severity
      sources: []
      note: "critical/high/medium/low/info — set by pipeline automation"

    "decision type":
      api_route: "/api/operator/decisions"
      column: pending_decisions.decision_type
      sources: []
      note: "staleness_alert, anomaly, tier_graduation, conflict_review, pipeline_failure, etc."


# ══════════════════════════════════════════════════════════════
# HARDCODED DATA — Frontend configuration not from database
# ══════════════════════════════════════════════════════════════
# These are NOT pipeline-sourced. Listed for completeness so
# "where does this come from?" has an answer even for static data.

hardcoded_data:
  local_issue_taxonomy:
    file: "web/src/lib/local-issues.ts"
    description: "14 Richmond-specific issue categories with keyword matching"
    affects_pages: ["/meetings/[id]"]
    note: "Keywords like 'chevron', 'rent control', 'point molate'"

  category_colors:
    file: "web/src/components/CategoryBadge.tsx"
    description: "24-category color mapping for Tailwind classes"
    affects_pages: ["/meetings", "/meetings/[id]", "/council/stats"]

  confidence_thresholds:
    file: "web/src/lib/thresholds.ts"
    description: "CONFIDENCE_STRONG=0.85, MODERATE=0.70, LOW=0.50, PUBLISHED=0.50"
    affects_pages: ["/reports/[meetingId]", "/financial-connections"]
    note: "Controls which flags are visible to public vs operator"

  council_roles:
    file: "web/src/lib/queries.ts"
    description: "Role list for council member filtering + deduplication"
    affects_pages: ["/council"]

  bloc_thresholds:
    file: "web/src/lib/queries.ts"
    description: "STRONG_BLOC_THRESHOLD=0.85, MODERATE=0.70, MIN_SHARED_VOTES=5"
    affects_pages: ["/council/coalitions"]
