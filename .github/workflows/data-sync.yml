name: Data Sync

on:
  schedule:
    # Daily: 7am UTC (11pm Pacific previous day)
    # Fast sources with compliance deadlines (NextRequest CPRA: 10-day response window).
    - cron: '0 7 * * *'
    # Weekly: Monday 8am UTC (midnight Pacific)
    # Core pipeline: minutes, agendas, campaign finance, open data.
    - cron: '0 8 * * 1'
    # Monthly: 15th of month at 9am UTC (1am Pacific)
    # CAL-ACCESS (1.5GB download) + Socrata regulatory datasets.
    - cron: '0 9 15 * *'
    # Quarterly: 1st of Jan/Apr/Jul/Oct at 10am UTC (2am Pacific)
    # Slow-changing sources: Form 700, behested payments, lobbyist registrations, nonprofits.
    - cron: '0 10 1 1,4,7,10 *'
  repository_dispatch:
    types: [sync-data]  # triggered by n8n
  workflow_dispatch:
    inputs:
      source:
        description: 'Data source to sync'
        required: true
        type: choice
        options:
          - netfile
          - calaccess
          - escribemeetings
          - escribemeetings_minutes
          - nextrequest
          - archive_center
          - minutes_extraction
          - meeting_summaries
          - form700
          - form803_behested
          - lobbyist_registrations
          - propublica
          - socrata_payroll
          - socrata_expenditures
          - socrata_permits
          - socrata_licenses
          - socrata_code_cases
          - socrata_service_requests
          - socrata_projects
      sync_type:
        description: 'full or incremental'
        required: false
        default: 'incremental'
        type: choice
        options:
          - incremental
          - full
      limit:
        description: 'Max docs per run (minutes_extraction only). Re-run to continue backfill.'
        required: false
        default: ''
        type: string
      trigger_source:
        description: 'What triggered this run'
        required: false
        default: 'manual'
        type: string

jobs:
  # Manual or n8n-triggered single-source sync
  sync:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    # minutes_extraction makes sequential Claude API calls and can run for hours.
    # calaccess full sync downloads 1.5GB ZIP. All other sources are fast.
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system CA certificates
        run: sudo apt-get update && sudo apt-get install -y ca-certificates

      - name: Install dependencies
        run: pip install -r requirements.txt certifi

      - name: Resolve inputs
        id: inputs
        run: |
          SOURCE="${{ github.event.inputs.source || github.event.client_payload.source }}"
          SYNC_TYPE="${{ github.event.inputs.sync_type || github.event.client_payload.sync_type || 'incremental' }}"
          TRIGGER="${{ github.event.inputs.trigger_source || github.event.client_payload.trigger_source || 'n8n' }}"
          LIMIT="${{ github.event.inputs.limit || github.event.client_payload.limit || '' }}"

          if [ -z "$SOURCE" ]; then
            echo "::error::source is required"
            exit 1
          fi

          echo "source=$SOURCE" >> "$GITHUB_OUTPUT"
          echo "sync_type=$SYNC_TYPE" >> "$GITHUB_OUTPUT"
          echo "trigger_source=$TRIGGER" >> "$GITHUB_OUTPUT"
          echo "limit=$LIMIT" >> "$GITHUB_OUTPUT"
          echo "Source: $SOURCE | Type: $SYNC_TYPE | Trigger: $TRIGGER | Limit: ${LIMIT:-none}"

      - name: Install Playwright browsers (for NextRequest)
        if: steps.inputs.outputs.source == 'nextrequest'
        run: python -m playwright install chromium --with-deps

      - name: Run data sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd src
          LIMIT_ARG=""
          if [ -n "${{ steps.inputs.outputs.limit }}" ]; then
            LIMIT_ARG="--limit ${{ steps.inputs.outputs.limit }}"
          fi
          python data_sync.py \
            --source "${{ steps.inputs.outputs.source }}" \
            --sync-type "${{ steps.inputs.outputs.sync_type }}" \
            --triggered-by "${{ steps.inputs.outputs.trigger_source }}" \
            --pipeline-run-id "${{ github.run_id }}" \
            $LIMIT_ARG

      - name: Self-assessment
        if: always()
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd src
          python self_assessment.py --days 1 --create-decisions

  # ── Daily: compliance-critical sources ───────────────────────
  # NextRequest has a 10-day CPRA response deadline. Daily sync
  # ensures the public records page reflects current status.
  daily-nextrequest:
    if: github.event_name == 'schedule' && github.event.schedule == '0 7 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system CA certificates
        run: sudo apt-get update && sudo apt-get install -y ca-certificates

      - name: Install dependencies
        run: pip install -r requirements.txt certifi

      - name: Sync NextRequest CPRA requests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd src
          python data_sync.py \
            --source nextrequest \
            --sync-type incremental \
            --triggered-by scheduled \
            --pipeline-run-id "${{ github.run_id }}"

  # ── Weekly scheduled pipeline ──────────────────────────────────
  # Runs every Monday: minutes pipeline + all data sources.
  # Each source is a separate step so failures are isolated.
  # NextRequest also runs here (in addition to daily) to catch
  # any daily failures and ensure weekly completeness.
  weekly-pipeline:
    if: github.event_name == 'schedule' && github.event.schedule == '0 8 * * 1'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system CA certificates
        run: sudo apt-get update && sudo apt-get install -y ca-certificates

      - name: Install dependencies
        run: pip install -r requirements.txt certifi

      # ── Minutes pipeline (existing) ──
      - name: Download new Archive Center documents
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd src
          python data_sync.py \
            --source archive_center \
            --triggered-by scheduled \
            --pipeline-run-id "${{ github.run_id }}"

      - name: Extract minutes to structured data
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd src
          python data_sync.py \
            --source minutes_extraction \
            --triggered-by scheduled \
            --pipeline-run-id "${{ github.run_id }}"

      # ── Meeting summaries (runs after minutes_extraction adds new vote data) ──
      - name: Generate meeting summaries
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd src
          python data_sync.py \
            --source meeting_summaries \
            --triggered-by scheduled \
            --pipeline-run-id "${{ github.run_id }}"

      # ── Meeting agendas (eSCRIBE) ──
      - name: Sync eSCRIBE meeting agendas
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd src
          python data_sync.py \
            --source escribemeetings \
            --sync-type incremental \
            --triggered-by scheduled \
            --pipeline-run-id "${{ github.run_id }}"

      - name: Discover Post-Meeting Minutes
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd src
          python data_sync.py \
            --source escribemeetings_minutes \
            --sync-type incremental \
            --triggered-by scheduled \
            --pipeline-run-id "${{ github.run_id }}"

      # ── Campaign finance ──
      - name: Sync NetFile contributions
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd src
          python data_sync.py \
            --source netfile \
            --sync-type incremental \
            --triggered-by scheduled \
            --pipeline-run-id "${{ github.run_id }}"

      # ── Public records ──
      - name: Sync NextRequest CPRA requests
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd src
          python data_sync.py \
            --source nextrequest \
            --sync-type incremental \
            --triggered-by scheduled \
            --pipeline-run-id "${{ github.run_id }}"

      # ── Open data ──
      - name: Sync Socrata expenditures
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd src
          python data_sync.py \
            --source socrata_expenditures \
            --sync-type incremental \
            --triggered-by scheduled \
            --pipeline-run-id "${{ github.run_id }}"

      - name: Sync Socrata payroll
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd src
          python data_sync.py \
            --source socrata_payroll \
            --sync-type incremental \
            --triggered-by scheduled \
            --pipeline-run-id "${{ github.run_id }}"

      - name: Self-assessment
        if: always()
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd src
          python self_assessment.py --days 1 --create-decisions

  # ── Monthly sources ───────────────────────────────────────────
  # Runs 15th of month: CAL-ACCESS (1.5GB) + Socrata regulatory datasets.
  # 15th avoids collision with quarterly (1st of quarter months).
  monthly-pipeline:
    if: github.event_name == 'schedule' && github.event.schedule == '0 9 15 * *'
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system CA certificates
        run: sudo apt-get update && sudo apt-get install -y ca-certificates

      - name: Install dependencies
        run: pip install -r requirements.txt certifi

      # ── State campaign finance (heavy) ──
      - name: Sync CAL-ACCESS state campaign finance
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd src
          python data_sync.py \
            --source calaccess \
            --sync-type full \
            --triggered-by scheduled \
            --pipeline-run-id "${{ github.run_id }}"

      # ── Socrata regulatory datasets ──
      - name: Sync Socrata permits
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd src
          python data_sync.py \
            --source socrata_permits \
            --sync-type incremental \
            --triggered-by scheduled \
            --pipeline-run-id "${{ github.run_id }}"

      - name: Sync Socrata licenses
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd src
          python data_sync.py \
            --source socrata_licenses \
            --sync-type incremental \
            --triggered-by scheduled \
            --pipeline-run-id "${{ github.run_id }}"

      - name: Sync Socrata code enforcement cases
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd src
          python data_sync.py \
            --source socrata_code_cases \
            --sync-type incremental \
            --triggered-by scheduled \
            --pipeline-run-id "${{ github.run_id }}"

      - name: Sync Socrata service requests
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd src
          python data_sync.py \
            --source socrata_service_requests \
            --sync-type incremental \
            --triggered-by scheduled \
            --pipeline-run-id "${{ github.run_id }}"

      - name: Sync Socrata development projects
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd src
          python data_sync.py \
            --source socrata_projects \
            --sync-type incremental \
            --triggered-by scheduled \
            --pipeline-run-id "${{ github.run_id }}"

      - name: Self-assessment
        if: always()
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd src
          python self_assessment.py --days 1 --create-decisions

  # ── Quarterly slow-changing sources ─────────────────────────
  # Runs 1st of Jan/Apr/Jul/Oct: financial disclosures, influence data.
  # These sources update infrequently (90-day staleness thresholds).
  quarterly-pipeline:
    if: github.event_name == 'schedule' && github.event.schedule == '0 10 1 1,4,7,10 *'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system CA certificates
        run: sudo apt-get update && sudo apt-get install -y ca-certificates

      - name: Install dependencies
        run: pip install -r requirements.txt certifi

      # ── Financial disclosures ──
      - name: Sync Form 700 economic interests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd src
          python data_sync.py \
            --source form700 \
            --sync-type full \
            --triggered-by scheduled \
            --pipeline-run-id "${{ github.run_id }}"

      - name: Sync FPPC Form 803 behested payments
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd src
          python data_sync.py \
            --source form803_behested \
            --sync-type full \
            --triggered-by scheduled \
            --pipeline-run-id "${{ github.run_id }}"

      # ── Influence transparency ──
      - name: Sync lobbyist registrations
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd src
          python data_sync.py \
            --source lobbyist_registrations \
            --sync-type full \
            --triggered-by scheduled \
            --pipeline-run-id "${{ github.run_id }}"

      - name: Sync ProPublica nonprofit data
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd src
          python data_sync.py \
            --source propublica \
            --sync-type full \
            --triggered-by scheduled \
            --pipeline-run-id "${{ github.run_id }}"

      - name: Self-assessment
        if: always()
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd src
          python self_assessment.py --days 1 --create-decisions
