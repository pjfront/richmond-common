name: Data Sync

on:
  schedule:
    # Weekly: Monday 7am UTC (Sunday 11pm Pacific)
    # Downloads new Archive Center docs + extracts minutes to structured data.
    # Minutes appear 2-4 weeks after meetings, so weekly catches them promptly.
    - cron: '0 7 * * 1'
  repository_dispatch:
    types: [sync-data]  # triggered by n8n
  workflow_dispatch:
    inputs:
      source:
        description: 'Data source to sync'
        required: true
        type: choice
        options:
          - netfile
          - calaccess
          - escribemeetings
          - nextrequest
          - archive_center
          - minutes_extraction
          - form700
      sync_type:
        description: 'full or incremental'
        required: false
        default: 'incremental'
        type: choice
        options:
          - incremental
          - full
      limit:
        description: 'Max docs per run (minutes_extraction only). Re-run to continue backfill.'
        required: false
        default: ''
        type: string
      trigger_source:
        description: 'What triggered this run'
        required: false
        default: 'manual'
        type: string

jobs:
  # Manual or n8n-triggered single-source sync
  sync:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    # minutes_extraction makes sequential Claude API calls and can run for hours.
    # calaccess full sync downloads 1.5GB ZIP. All other sources are fast.
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system CA certificates
        run: sudo apt-get update && sudo apt-get install -y ca-certificates

      - name: Install dependencies
        run: pip install -r requirements.txt certifi

      - name: Resolve inputs
        id: inputs
        run: |
          SOURCE="${{ github.event.inputs.source || github.event.client_payload.source }}"
          SYNC_TYPE="${{ github.event.inputs.sync_type || github.event.client_payload.sync_type || 'incremental' }}"
          TRIGGER="${{ github.event.inputs.trigger_source || github.event.client_payload.trigger_source || 'n8n' }}"
          LIMIT="${{ github.event.inputs.limit || github.event.client_payload.limit || '' }}"

          if [ -z "$SOURCE" ]; then
            echo "::error::source is required"
            exit 1
          fi

          echo "source=$SOURCE" >> "$GITHUB_OUTPUT"
          echo "sync_type=$SYNC_TYPE" >> "$GITHUB_OUTPUT"
          echo "trigger_source=$TRIGGER" >> "$GITHUB_OUTPUT"
          echo "limit=$LIMIT" >> "$GITHUB_OUTPUT"
          echo "Source: $SOURCE | Type: $SYNC_TYPE | Trigger: $TRIGGER | Limit: ${LIMIT:-none}"

      - name: Install Playwright browsers (for NextRequest)
        if: steps.inputs.outputs.source == 'nextrequest'
        run: python -m playwright install chromium --with-deps

      - name: Run data sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd src
          LIMIT_ARG=""
          if [ -n "${{ steps.inputs.outputs.limit }}" ]; then
            LIMIT_ARG="--limit ${{ steps.inputs.outputs.limit }}"
          fi
          python data_sync.py \
            --source "${{ steps.inputs.outputs.source }}" \
            --sync-type "${{ steps.inputs.outputs.sync_type }}" \
            --triggered-by "${{ steps.inputs.outputs.trigger_source }}" \
            --pipeline-run-id "${{ github.run_id }}" \
            $LIMIT_ARG

      - name: Self-assessment
        if: always()
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd src
          python self_assessment.py --days 1

  # Weekly scheduled pipeline: download new minutes + extract to structured data
  weekly-minutes:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system CA certificates
        run: sudo apt-get update && sudo apt-get install -y ca-certificates

      - name: Install dependencies
        run: pip install -r requirements.txt certifi

      - name: Download new Archive Center documents
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd src
          python data_sync.py \
            --source archive_center \
            --triggered-by scheduled \
            --pipeline-run-id "${{ github.run_id }}"

      - name: Extract minutes to structured data
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd src
          python data_sync.py \
            --source minutes_extraction \
            --triggered-by scheduled \
            --pipeline-run-id "${{ github.run_id }}"

      - name: Self-assessment
        if: always()
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd src
          python self_assessment.py --days 1
