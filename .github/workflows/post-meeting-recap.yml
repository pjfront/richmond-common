name: Post-Meeting Recap

# Runs daily. Queries the DB for yesterday's meeting — only runs
# the pipeline when a regular council meeting actually happened.
# Costs nothing on non-meeting days (one REST call, exits in <1s).
#
# KCRT uploads YouTube transcripts within hours of the meeting.
# Running at 7am Pacific (next morning) gives enough buffer.

on:
  schedule:
    # Daily 3:17pm UTC (7:17am Pacific)
    - cron: '17 15 * * *'
  workflow_dispatch:
    inputs:
      meeting_date:
        description: 'Override: specific meeting date (YYYY-MM-DD)'
        required: false
        type: string
      force:
        description: 'Regenerate existing recaps'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  # ── Gate: did a meeting happen yesterday? ────────────────────
  check-meeting:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      meeting_date: ${{ steps.check.outputs.meeting_date }}
      has_meeting: ${{ steps.check.outputs.has_meeting }}

    steps:
      - name: Check for yesterday's meeting
        id: check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          # Manual override bypasses the gate
          OVERRIDE="${{ github.event.inputs.meeting_date }}"
          if [ -n "$OVERRIDE" ]; then
            echo "meeting_date=$OVERRIDE" >> "$GITHUB_OUTPUT"
            echo "has_meeting=true" >> "$GITHUB_OUTPUT"
            echo "Manual override: $OVERRIDE"
            exit 0
          fi

          # Query Supabase REST API for yesterday's regular meeting
          YESTERDAY=$(date -u -d "yesterday" +%Y-%m-%d)
          echo "Checking for meeting on $YESTERDAY..."

          RESPONSE=$(curl -sf \
            "${SUPABASE_URL}/rest/v1/meetings?meeting_date=eq.${YESTERDAY}&meeting_type=eq.regular&city_fips=eq.0660620&select=meeting_date" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}")

          if echo "$RESPONSE" | python3 -c "import sys,json; data=json.load(sys.stdin); exit(0 if data else 1)" 2>/dev/null; then
            echo "meeting_date=$YESTERDAY" >> "$GITHUB_OUTPUT"
            echo "has_meeting=true" >> "$GITHUB_OUTPUT"
            echo "Meeting found: $YESTERDAY"
          else
            echo "has_meeting=false" >> "$GITHUB_OUTPUT"
            echo "No meeting on $YESTERDAY — done"
          fi

  # ── Pipeline: transcript fetch + recap generation ────────────
  recap:
    needs: check-meeting
    if: needs.check-meeting.outputs.has_meeting == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt yt-dlp

      - name: Run post-meeting recap pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_PROXY: ${{ secrets.YOUTUBE_PROXY }}
        run: |
          cd src

          MEETING_DATE="${{ needs.check-meeting.outputs.meeting_date }}"
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi

          echo "=== Post-meeting recap for $MEETING_DATE ==="

          # Full pipeline: transcript fetch (needs proxy) + speaker counts + recaps
          python post_meeting_recap.py \
            --meeting-date "$MEETING_DATE" \
            $FORCE_FLAG

          echo "=== Done ==="
