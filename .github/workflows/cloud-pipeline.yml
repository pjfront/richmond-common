name: Cloud Pipeline

on:
  schedule:
    # Every Monday at 6am UTC (Sunday 10pm Pacific)
    # Richmond council meets on Tuesdays — this gives data a day to land before meetings
    - cron: '0 6 * * 1'
    # Quarterly retrospective sweep: 1st of Jan, Apr, Jul, Oct at 8am UTC
    # Re-scans trailing 24 months for post-vote donation patterns (temporal correlation)
    - cron: '0 8 1 1,4,7,10 *'
  repository_dispatch:
    types: [run-pipeline]  # triggered by n8n
  workflow_dispatch:
    inputs:
      meeting_date:
        description: 'Meeting date (YYYY-MM-DD). Leave empty to auto-detect next Tuesday.'
        required: false
        type: string
      scan_mode:
        description: 'prospective or retrospective'
        required: false
        default: 'prospective'
        type: choice
        options:
          - prospective
          - retrospective
      trigger_source:
        description: 'What triggered this run'
        required: false
        default: 'manual'
        type: string

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system CA certificates
        run: sudo apt-get update && sudo apt-get install -y ca-certificates

      - name: Install dependencies
        run: pip install -r requirements.txt certifi

      - name: Resolve inputs
        id: inputs
        run: |
          # Resolve from workflow_dispatch inputs, repository_dispatch payload, or auto-detect for cron
          MEETING_DATE="${{ github.event.inputs.meeting_date || github.event.client_payload.meeting_date }}"
          SCAN_MODE="${{ github.event.inputs.scan_mode || github.event.client_payload.scan_mode || 'prospective' }}"
          TRIGGER="${{ github.event.inputs.trigger_source || github.event.client_payload.trigger_source }}"

          # Auto-detect next Tuesday for scheduled (cron) runs or empty manual runs
          if [ -z "$MEETING_DATE" ]; then
            MEETING_DATE=$(python3 -c "
          from datetime import date, timedelta
          today = date.today()
          days_ahead = (1 - today.weekday()) % 7  # Tuesday = 1
          if days_ahead == 0:
              days_ahead = 7
          print((today + timedelta(days=days_ahead)).isoformat())
          ")
            echo "Auto-detected next Tuesday: $MEETING_DATE"
          fi

          # Detect quarterly retrospective trigger (1st of month = retrospective sweep)
          if [ "${{ github.event_name }}" = "schedule" ]; then
            CURRENT_DAY=$(date +%d)
            if [ "$CURRENT_DAY" = "01" ]; then
              SCAN_MODE="retrospective"
              TRIGGER="quarterly-retrospective"
              echo "Quarterly retrospective sweep triggered"
            fi
          fi

          # Default trigger source based on event type
          if [ -z "$TRIGGER" ]; then
            if [ "${{ github.event_name }}" = "schedule" ]; then
              TRIGGER="scheduled"
            else
              TRIGGER="manual"
            fi
          fi

          echo "meeting_date=$MEETING_DATE" >> "$GITHUB_OUTPUT"
          echo "scan_mode=$SCAN_MODE" >> "$GITHUB_OUTPUT"
          echo "trigger_source=$TRIGGER" >> "$GITHUB_OUTPUT"
          echo "Meeting: $MEETING_DATE | Mode: $SCAN_MODE | Trigger: $TRIGGER"

      - name: Run cloud pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd src
          python cloud_pipeline.py \
            --date "${{ steps.inputs.outputs.meeting_date }}" \
            --scan-mode "${{ steps.inputs.outputs.scan_mode }}" \
            --triggered-by "${{ steps.inputs.outputs.trigger_source }}" \
            --pipeline-run-id "${{ github.run_id }}"

      - name: Data quality checks
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd src
          python data_quality_checks.py --create-decisions || true

      - name: Self-assessment
        if: always()
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd src
          python self_assessment.py --days 1 --create-decisions

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: pipeline-${{ steps.inputs.outputs.meeting_date }}-${{ github.run_id }}
          path: src/data/audit_runs/
          retention-days: 90
