name: Source Change Detector

on:
  schedule:
    # Hourly, offset from :00 to reduce load spikes.
    # Reduced from every 15 min to hourly to cut Supabase Disk IO —
    # civic data cadence (minutes posted 1-3 days ahead, filings daily) does
    # not require sub-hour freshness. Manual dispatch available for urgent checks.
    - cron: '18 * * * *'
  workflow_dispatch:
    inputs:
      source:
        description: 'Check a single source (or leave empty for all)'
        required: false
        type: choice
        options:
          - ''
          - escribemeetings
          - netfile
          - socrata
          - nextrequest
          - calaccess
      dry_run:
        description: 'Check without triggering dispatches'
        required: false
        default: false
        type: boolean

permissions:
  contents: write          # required for repository_dispatch to data-sync.yml

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Sparse checkout (change_detector.py only)
        uses: actions/checkout@v5
        with:
          sparse-checkout: |
            src/change_detector.py
          sparse-checkout-cone-mode: false

      - name: Check for source changes
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GITHUB_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          SOURCE_ARG=""
          if [ -n "${{ github.event.inputs.source }}" ]; then
            SOURCE_ARG="--source ${{ github.event.inputs.source }}"
          fi

          DRY_RUN_ARG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_ARG="--dry-run"
          fi

          python src/change_detector.py $SOURCE_ARG $DRY_RUN_ARG
