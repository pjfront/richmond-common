name: "\U0001F41B Bug Report"
description: Report incorrect data, broken pages, or other issues
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead?
  - type: input
    id: url
    attributes:
      label: URL where the issue occurs
      placeholder: "https://richmondcommon.org/..."
  - type: textarea
    id: screenshot
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.
