name: "\U0001F4A1 Feature Request"
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like to see?
      description: Describe the feature and why it would be useful.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any examples, mockups, or references that help explain the idea.
