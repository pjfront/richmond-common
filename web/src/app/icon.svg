<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Civic-navy rounded square -->
  <rect width="32" height="32" rx="7" fill="#1e3a5f"/>
  <!-- Four seats at the table — the commons -->
  <circle cx="9.5" cy="9.5" r="4.5" fill="white"/>
  <circle cx="22.5" cy="9.5" r="4.5" fill="white"/>
  <circle cx="9.5" cy="22.5" r="4.5" fill="white"/>
  <!-- The fourth seat is yours -->
  <circle cx="22.5" cy="22.5" r="4.5" fill="#fbbf24"/>
</svg>
